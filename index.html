<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap + Luxon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" defer>
    </script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js" defer>
    </script>
    <style>
        body {
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .btn-danger-custom {
            background-color: #dc3545;
            border-color: #dc3545;
            color: #fff;
            font-size: 2rem;
            padding: 40px 20px;
            width: 100%;
            border-radius: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 14px rgba(220, 53, 69, 0.3);
        }
        .btn-danger-custom:hover {
            background-color: #b02a37;
            border-color: #b02a37;
            transform: scale(1.02);
        }
        .modal-header {
            border-bottom: 3px solid #dc3545;
        }
        .modal-title {
            font-weight: 700;
            color: #1a3c5e;
        }
        .modal-body {
            font-size: 2rem;
            font-weight: 600;
            color: #0d6efd;
            text-align: center;
            padding: 40px 20px;
        }
        .modal-footer {
            border-top: none;
        }
        .col-center {
            display: flex;
            align-items: center;
            min-height: 80vh;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row">

            <div class="col-2"></div>

            <div class="col-8 col-center">
                <button
                type="button"
                class="btn btn-danger-custom"
                data-bs-toggle="modal"
                data-bs-target="#timeModal"
                >
                Показать время
            </button>
        </div>

        <div class="col-2"></div>

    </div>
</div>

<div class="modal fade" id="timeModal" tabindex="-1" aria-labelledby="timeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="timeModalLabel">
                    Выполнила: <span id="studentName">Николь Харитошкина</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>

            <div class="modal-body" id="modalTime">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {

        function updateTime() {
            const now = luxon.DateTime.local()
                .setLocale('ru')
                .toFormat('dd.MM.yyyy HH:mm:ss');

            const timeElement = document.getElementById('modalTime');
            if (timeElement) {
                timeElement.textContent = now;
            }
        }

        const modal = document.getElementById('timeModal');
        modal.addEventListener('shown.bs.modal', function() {
            updateTime();
        });
    });
</script>

</body>
</html>
